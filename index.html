<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор чаевых</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family: "Nunito", "Segoe UI", "Trebuchet MS", Arial, sans-serif;
      --bg: #f8faff;
      --bg-accent: #eef2ff;
      --card: rgba(255, 255, 255, 0.94);
      --text: #0f172a;
      --muted: #64748b;
      --line: #d9e1ff;
      --primary: #5b5ff7;
      --primary-hover: #4f46e5;
      --focus: rgba(91, 95, 247, 0.25);
      --shadow: 0 24px 60px rgba(80, 80, 180, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      background:
        radial-gradient(circle at 10% 5%, #dbeafe 0, transparent 45%),
        radial-gradient(circle at 90% 95%, #ddd6fe 0, transparent 50%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
      color: var(--text);
    }

    .container {
      max-width: 620px;
      min-height: calc(100vh - 32px);
      margin: 0 auto;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0;
      font-size: clamp(1.45rem, 2vw, 1.75rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 55%, #0ea5e9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero {
      display: grid;
      gap: 6px;
      margin-bottom: 2px;
      padding: 8px 10px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f6f8ff 0%, #fcfdff 100%);
      border: 1px solid #e6ebff;
    }

    .hero-text {
      margin: 0;
      font-size: 0.84rem;
      color: #334155;
      line-height: 1.35;
    }

    .hero-note {
      font-size: 0.78rem;
      color: #64748b;
      font-weight: 600;
      margin: 0;
    }

    .calculator-form {
      display: grid;
      gap: 9px;
      margin-top: 6px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #334155;
    }

    input, button {
      font: inherit;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      transition: all 0.18s ease;
      font-size: 0.86rem;
    }

    input {
      background: #ffffff;
    }

    input:hover {
      border-color: #c8d4ff;
    }

    button {
      border: none;
      background: linear-gradient(135deg, #6b73ff 0%, var(--primary) 100%);
      color: #ffffff;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 10px 22px rgba(91, 95, 247, 0.3);
    }

    button:hover {
      background: linear-gradient(135deg, #5d63f3 0%, var(--primary-hover) 100%);
      transform: translateY(-1px);
    }

    input:focus-visible,
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 1px;
    }

    input::placeholder {
      color: #94a3b8;
    }

    .quick-tips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 0;
    }

    .tip-chip {
      border: 1px solid #d6deff;
      background: #f6f8ff;
      color: #374151;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      box-shadow: none;
    }

    .tip-chip:hover {
      background: #e9eeff;
      color: #1e293b;
      transform: none;
    }

    .result {
      margin-top: 8px;
      border: 1px solid #d8e0ff;
      border-radius: 12px;
      background: linear-gradient(180deg, #f8faff 0%, #f2f6ff 100%);
      padding: 9px 10px;
      display: grid;
      gap: 6px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.86rem;
    }

    .result-label {
      color: #475569;
      font-weight: 700;
    }

    .result-value {
      font-weight: 800;
      color: #111827;
    }

    .hint {
      margin: 0;
      color: #64748b;
      font-size: 0.78rem;
      min-height: 1.2em;
    }

    @media (max-width: 640px) {
      body {
        padding: 8px;
      }

      .container {
        min-height: calc(100vh - 16px);
        padding: 10px;
      }

    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Калькулятор чаевых</h1>
    <section class="hero">
      <p class="hero-text">Введите сумму счета, процент чаевых и количество людей, чтобы быстро разделить оплату.</p>
      <p class="hero-note">Просто введите данные и нажмите «Посчитать»</p>
    </section>

    <form id="tip-form" class="calculator-form">
      <div class="field">
        <label for="bill-amount">Сумма счета</label>
        <input id="bill-amount" type="number" min="0" step="0.01" placeholder="Например, 2500" required>
        <div class="quick-tips" role="group" aria-label="Быстрый выбор суммы счета">
          <button type="button" class="tip-chip bill-chip" data-bill="1000">1000</button>
          <button type="button" class="tip-chip bill-chip" data-bill="2500">2500</button>
          <button type="button" class="tip-chip bill-chip" data-bill="5000">5000</button>
        </div>
      </div>

      <div class="field">
        <label for="tip-percent">Процент чаевых</label>
        <input id="tip-percent" type="number" min="0" step="0.1" placeholder="Например, 10" required>
        <div class="quick-tips" role="group" aria-label="Быстрый выбор процента">
          <button type="button" class="tip-chip percent-chip" data-tip="5">5%</button>
          <button type="button" class="tip-chip percent-chip" data-tip="10">10%</button>
          <button type="button" class="tip-chip percent-chip" data-tip="15">15%</button>
        </div>
      </div>

      <div class="field">
        <label for="people-count">Количество людей</label>
        <input id="people-count" type="number" min="1" step="1" placeholder="Например, 3" required>
        <div class="quick-tips" role="group" aria-label="Быстрый выбор количества людей">
          <button type="button" class="tip-chip people-chip" data-people="1">1</button>
          <button type="button" class="tip-chip people-chip" data-people="2">2</button>
          <button type="button" class="tip-chip people-chip" data-people="4">4</button>
        </div>
      </div>

      <button type="submit">Посчитать</button>
    </form>

    <div class="result" aria-live="polite">
      <div class="result-row">
        <span class="result-label">Чаевые:</span>
        <span id="tip-result" class="result-value">0.00</span>
      </div>
      <div class="result-row">
        <span class="result-label">Сумма на человека:</span>
        <span id="per-person-result" class="result-value">0.00</span>
      </div>
    </div>
    <p id="calc-message" class="hint"></p>
  </main>

  <script>
    const tipForm = document.getElementById("tip-form");
    const billAmountInput = document.getElementById("bill-amount");
    const tipPercentInput = document.getElementById("tip-percent");
    const peopleCountInput = document.getElementById("people-count");
    const tipResult = document.getElementById("tip-result");
    const perPersonResult = document.getElementById("per-person-result");
    const calcMessage = document.getElementById("calc-message");
    const tipChips = Array.from(document.querySelectorAll(".percent-chip"));
    const billChips = Array.from(document.querySelectorAll(".bill-chip"));
    const peopleChips = Array.from(document.querySelectorAll(".people-chip"));

    function formatMoney(value) {
      return value.toFixed(2);
    }

    tipChips.forEach((chip) => {
      chip.addEventListener("click", () => {
        tipPercentInput.value = chip.dataset.tip;
        calcMessage.textContent = `Выбрано чаевых: ${chip.dataset.tip}%`;
      });
    });

    billChips.forEach((chip) => {
      chip.addEventListener("click", () => {
        billAmountInput.value = chip.dataset.bill;
        calcMessage.textContent = `Выбрана сумма счета: ${chip.dataset.bill}`;
      });
    });

    peopleChips.forEach((chip) => {
      chip.addEventListener("click", () => {
        peopleCountInput.value = chip.dataset.people;
        calcMessage.textContent = `Выбрано людей: ${chip.dataset.people}`;
      });
    });

    tipForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const billAmount = Number(billAmountInput.value);
      const tipPercent = Number(tipPercentInput.value);
      const peopleCount = Number(peopleCountInput.value);

      if (billAmount < 0 || tipPercent < 0 || peopleCount < 1 || !Number.isFinite(billAmount) || !Number.isFinite(tipPercent) || !Number.isFinite(peopleCount)) {
        calcMessage.textContent = "Проверьте значения: сумма и процент не могут быть отрицательными, людей должно быть минимум 1.";
        return;
      }

      const tip = billAmount * (tipPercent / 100);
      const total = billAmount + tip;
      const perPerson = total / peopleCount;

      tipResult.textContent = formatMoney(tip);
      perPersonResult.textContent = formatMoney(perPerson);
      calcMessage.textContent = "Расчет выполнен.";
    });
  </script>
</body>
</html>
