<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список покупок</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 640px;
      margin: 40px auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 140px 120px;
      gap: 8px;
      margin-bottom: 16px;
    }

    input, button {
      font: inherit;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
    }

    button {
      border: none;
      background: #2563eb;
      color: #ffffff;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .filter-btn {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #1f2937;
      padding: 8px 10px;
    }

    .filter-btn:hover {
      background: #f3f4f6;
    }

    .filter-btn.active {
      border-color: #2563eb;
      background: #dbeafe;
      color: #1e40af;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 8px;
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fafafa;
    }

    .item-name {
      font-weight: 600;
    }

    .qty {
      color: #4b5563;
    }

    .done .item-name,
    .done .qty {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: #ef4444;
      padding: 8px 10px;
    }

    .delete-btn:hover {
      background: #dc2626;
    }

    .empty {
      color: #6b7280;
      text-align: center;
      padding: 14px 8px;
      border: 1px dashed #d1d5db;
      border-radius: 10px;
    }

    @media (max-width: 640px) {
      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Список покупок</h1>

    <form id="add-form">
      <input id="product-input" type="text" placeholder="Товар" required>
      <input id="qty-input" type="text" placeholder="Количество" required>
      <button type="submit">Добавить</button>
    </form>

    <div class="filters" role="group" aria-label="Фильтр списка">
      <button type="button" class="filter-btn active" data-filter="all">Все</button>
      <button type="button" class="filter-btn" data-filter="done">Куплено</button>
      <button type="button" class="filter-btn" data-filter="todo">Не куплено</button>
    </div>

    <ul id="shopping-list"></ul>
    <p id="empty-message" class="empty">Список пока пуст</p>
  </main>

  <script>
    const addForm = document.getElementById("add-form");
    const productInput = document.getElementById("product-input");
    const qtyInput = document.getElementById("qty-input");
    const shoppingList = document.getElementById("shopping-list");
    const emptyMessage = document.getElementById("empty-message");
    const filterButtons = Array.from(document.querySelectorAll(".filter-btn"));

    const items = [];
    let currentFilter = "all";

    function render() {
      shoppingList.innerHTML = "";
      const filteredItems = items.filter((item) => {
        if (currentFilter === "done") {
          return item.done;
        }
        if (currentFilter === "todo") {
          return !item.done;
        }
        return true;
      });

      emptyMessage.textContent = items.length === 0
        ? "Список пока пуст"
        : "Нет элементов для выбранного фильтра";
      emptyMessage.style.display = filteredItems.length === 0 ? "block" : "none";

      filteredItems.forEach((item) => {
        const li = document.createElement("li");
        li.className = `item ${item.done ? "done" : ""}`;

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = item.done;
        checkbox.title = "Куплено";
        checkbox.addEventListener("change", () => {
          item.done = checkbox.checked;
          render();
        });

        const name = document.createElement("span");
        name.className = "item-name";
        name.textContent = item.product;

        const qty = document.createElement("span");
        qty.className = "qty";
        qty.textContent = `Количество: ${item.quantity}`;

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "delete-btn";
        deleteButton.textContent = "Удалить";
        deleteButton.addEventListener("click", () => {
          const index = items.findIndex((x) => x.id === item.id);
          if (index !== -1) {
            items.splice(index, 1);
            render();
          }
        });

        li.appendChild(checkbox);
        li.appendChild(name);
        li.appendChild(qty);
        li.appendChild(deleteButton);
        shoppingList.appendChild(li);
      });
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentFilter = button.dataset.filter;
        filterButtons.forEach((x) => {
          x.classList.toggle("active", x === button);
        });
        render();
      });
    });

    addForm.addEventListener("submit", (event) => {
      event.preventDefault();

      const product = productInput.value.trim();
      const quantity = qtyInput.value.trim();
      if (!product || !quantity) {
        return;
      }

      items.push({
        id: Date.now() + Math.random(),
        product,
        quantity,
        done: false
      });

      addForm.reset();
      productInput.focus();
      render();
    });

    render();
  </script>
</body>
</html>
